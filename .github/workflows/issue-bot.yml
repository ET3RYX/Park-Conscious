name: Issue Bot Action
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Issue Type'
        required: true
        type: choice
        options:
          - Feature Request
          - Bug Report
          - Maintenance
        default: 'Feature Request'
      title:
        description: 'Issue Title'
        required: true
        default: 'New Task'
      description:
        description: 'Brief Description (the bot will format this nicely)'
        required: true
        default: ''
      priority:
        description: 'Priority'
        required: true
        type: choice
        options:
          - High
          - Medium
          - Low
        default: 'Medium'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Prepare Issue Body
        id: prepare
        env:
          INPUT_TYPE: ${{ github.event.inputs.type }}
          INPUT_DESC: ${{ github.event.inputs.description }}
          INPUT_PRIORITY: ${{ github.event.inputs.priority }}
        run: |
          if [ "$INPUT_TYPE" == "Bug Report" ]; then
            BODY="## 🐛 Bug Report
            
            **Description:**
            $INPUT_DESC
            
            **Metadata:**
            - **Priority:** $INPUT_PRIORITY
            - **Reported Via:** Manual Issue Bot
            
            ### 🛠 Suggested Next Steps
            - [ ] Reproduce the issue in the development environment.
            - [ ] Identify if this is a regression or a new bug.
            - [ ] Fix and verify across supported devices.
            "
          elif [ "$INPUT_TYPE" == "Feature Request" ]; then
            BODY="## ✨ Feature Request
            
            **Core Objective:**
            $INPUT_DESC
            
            **Metadata:**
            - **Priority:** $INPUT_PRIORITY
            - **Origin:** Enhancement Suggestion
            
            ### 📋 Implementation Checklist
            - [ ] Define technical requirements and architecture.
            - [ ] Create UI/UX mockup (if applicable).
            - [ ] Implement core functionality.
            - [ ] Write unit and integration tests.
            "
          else
            BODY="## 🛠 Maintenance Task
            
            **Task Overview:**
            $INPUT_DESC
            
            **Metadata:**
            - **Priority:** $INPUT_PRIORITY
            
            ---
            *Generated by Issue Bot Action*"
          fi
          
          # Multiline output workaround
          {
            echo "formatted_body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Issue
        uses: imjohnbo/issue-bot@v3.4.5
        with:
          title: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.title || 'Monthly Ecosystem Health Audit' }}"
          labels: "${{ github.event_name == 'workflow_dispatch' && format('bot, {0}', github.event.inputs.type) || 'bot, maintenance' }}"
          body: "${{ github.event_name == 'workflow_dispatch' && steps.prepare.outputs.formatted_body || '## 📋 Standard Maintenance Checklist\nAutomated health audit for the Park Conscious ecosystem.\n\n- [ ] SSL Certificates\n- [ ] Server Logs\n- [ ] Database\n- [ ] Dependencies\n- [ ] Security\n\n---Generated by Issue Bot Action' }}"
          token: ${{ secrets.GITHUB_TOKEN }}
