                            </th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-600 uppercase tracking-wider">Location</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-600 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody" class="divide-y divide-slate-200">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function fetchLogs() {
            try {
                // Determine API URL
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const API_URL = isLocal ? (window.location.port === '3000' ? '/api/logs' : 'http://localhost:5050/api/logs') : '/api/logs';

                const response = await fetch(API_URL);
                const data = await response.json();

                const body = document.getElementById('logsBody');
                body.innerHTML = '';

                data.forEach(log => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-white/5 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 text-sm text-gray-300 font-mono">${new Date(log.timestamp).toLocaleString()}</td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-md font-bold tracking-widest uppercase">
                                ${log.plateNumber}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-400">${log.location}</td>
                        <td class="px-6 py-4">
                            <span class="text-xs bg-green-500/10 text-green-400 border border-green-500/20 px-2 py-0.5 rounded-full">Detected</span>
                        </td>
                    `;
                    body.appendChild(row);
                });

                if (data.length === 0) {
                    body.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-gray-500">No detections logged yet...</td></tr>';
                }
            } catch (error) {
                console.error('Failed to fetch logs:', error);
            }
        }

        // Poll for new logs every 5 seconds
        fetchLogs();
        setInterval(fetchLogs, 5000);
        // Mobile sidebar logic
        const openBtn = document.getElementById('mobile-sidebar-open');
        const closeBtn = document.getElementById('mobile-sidebar-close');
        const overlay = document.getElementById('mobile-sidebar-overlay');
        const sidebar = document.getElementById('mobile-sidebar');
        const drawer = document.getElementById('mobile-sidebar-drawer');

        function openSidebar() {
            sidebar.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                drawer.classList.remove('translate-x-full');
            }, 10);
        }

        function closeSidebar() {
            overlay.classList.add('opacity-0');
            drawer.classList.add('translate-x-full');
            setTimeout(() => {
                sidebar.classList.add('hidden');
            }, 300);
        }

        openBtn?.addEventListener('click', openSidebar);
        closeBtn?.addEventListener('click', closeSidebar);
        overlay?.addEventListener('click', closeSidebar);
    </script>
