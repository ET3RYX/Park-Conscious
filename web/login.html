<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Park Conscious</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
      <div class="absolute top-0 left-1/4 w-[600px] h-[600px] bg-[#00C39A]/10 blur-[100px] rounded-full"></div>
      <div class="absolute bottom-0 right-1/4 w-[600px] h-[600px] bg-blue-400/5 blur-[100px] rounded-full"></div>
    </div>

    <div onclick="window.location.href='index.html'" class="absolute top-8 left-8 cursor-pointer flex items-center gap-2 text-slate-500 hover:text-slate-900 transition-colors font-medium z-10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        Back to Home
    </div>

    <div class="glass-panel w-full max-w-md p-6 sm:p-10 rounded-[2rem] sm:rounded-[2.5rem] relative z-10">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-6 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center overflow-hidden">
                <img src="./assets/logo.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 id="form-title" class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h1>
            <p id="form-subtitle" class="text-slate-500 text-sm">Sign in to your Park Conscious account</p>
        </div>

        <form id="auth-form" class="space-y-5" onsubmit="handleAuth(event)">
            <div id="name-field" style="display: none;">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#00C39A]/20 focus:border-[#00C39A] transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#00C39A]/20 focus:border-[#00C39A] transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#00C39A]/20 focus:border-[#00C39A] transition-all">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 transition-all shadow-lg hover:shadow-xl mt-2">
                Sign In
            </button>
        </form>

        <div class="relative flex items-center py-6">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="flex-shrink-0 mx-4 text-slate-400 text-xs font-bold uppercase tracking-wider">Or</span>
            <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <div id="google-btn-container" class="flex justify-center w-full mb-6"></div>

        <div class="text-center text-sm font-medium text-slate-500">
            <span id="toggle-text">Don't have an account?</span>
            <button type="button" onclick="toggleForm()" class="text-[#00C39A] font-bold hover:text-[#00A683] ml-1 transition-colors">Sign Up</button>
        </div>
        
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <button onclick="window.location.href='owner/login.html'" class="text-xs font-bold text-slate-400 hover:text-slate-600 uppercase tracking-widest transition-colors flex items-center justify-center gap-1 w-full">
                Switch to Owner Portal <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="fixed bottom-4 right-4 bg-red-50 border border-red-200 text-red-600 px-6 py-4 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 font-medium text-sm flex items-center gap-3">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span id="error-message">Error</span>
    </div>

    <script>
        let isSignup = false;
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_URL = isLocal ? (window.location.port === '3000' ? '' : 'http://localhost:5050') : '';

        function toggleForm() {
            isSignup = !isSignup;
            const nameField = document.getElementById('name-field');
            const submitBtn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');
            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');
            const toggleBtn = document.querySelector('button[onclick="toggleForm()"]');

            if (isSignup) {
                nameField.style.display = 'block';
                document.getElementById('name').required = true;
                submitBtn.innerText = 'Create Account';
                formTitle.innerText = 'Create Account';
                formSubtitle.innerText = 'Join Park Conscious today';
                toggleText.innerText = 'Already have an account?';
                toggleBtn.innerText = 'Sign In';
            } else {
                nameField.style.display = 'none';
                document.getElementById('name').required = false;
                submitBtn.innerText = 'Sign In';
                formTitle.innerText = 'Welcome Back';
                formSubtitle.innerText = 'Sign in to your Park Conscious account';
                toggleText.innerText = "Don't have an account?";
                toggleBtn.innerText = 'Sign Up';
            }
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-message').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 4000);
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Please wait...';
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const endpoint = isSignup ? '/api/auth/signup' : '/api/auth/login';
            const payload = isSignup ? { name, email, password } : { email, password };

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('park_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    showError(data.message);
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                showError("Server connection failed");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        window.onload = function () {
            if (window.google) {
                google.accounts.id.initialize({
                    client_id: "226356760349-2i4fuvevqqfqanehgjedcavlngurvlug.apps.googleusercontent.com",
                    callback: handleGoogleResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("google-btn-container"),
                    { theme: "outline", size: "large", shape: "pill", width: 330, logo_alignment: "center" }
                );
            }
        }

        async function handleGoogleResponse(response) {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const payload = JSON.parse(jsonPayload);

            try {
                const res = await fetch(`${API_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: payload.email,
                        name: payload.name,
                        googleId: payload.sub
                    })
                });
                
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('park_user', JSON.stringify(data.user));
                    window.location.href = 'index.html?login=success';
                } else {
                    console.error("User Google Auth Failed:", data);
                    showError(data.message || "Google Login failed - please try standard login");
                }
            } catch (err) {
                console.error("User Google Auth Network Error:", err);
                showError("Server connection failed during Google Login");
            }
        }
    </script>
</body>
</html>
